server.port=${SERVER_PORT:8080}

# Database Configuration - Using Environment Variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Configuration - Optimized for Supabase Session Pooler (Port 6543)
# Aggressive settings to handle pooler connection closures
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.keepalive-time=60000

# PostgreSQL-specific connection properties for session pooler
spring.datasource.hikari.data-source-properties.socketTimeout=30
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true
spring.datasource.hikari.data-source-properties.ApplicationName=LineApp
spring.datasource.hikari.data-source-properties.assumeMinServerVersion=12

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =======================================
# SWAGGER AUTHENTICATION CONFIGURATION
# =======================================
# Custom Swagger credentials (replaces default Spring Security user)
swagger.auth.username=${SWAGGER_USERNAME}
swagger.auth.password=${SWAGGER_PASSWORD}

# JWT Configuration - Using Environment Variables
app.jwt.secret=${JWT_SECRET}
# 30 days default token expiry (ms)
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:2592000000}

# =======================================
# ALERT SERVICE CONFIGURATION
# =======================================

# WhatsApp Configuration (Facebook/Meta Graph API)
whatsapp.enabled=false
whatsapp.api.url=https://graph.facebook.com/v18.0
whatsapp.phone.number.id=YOUR_PHONE_NUMBER_ID
whatsapp.access.token=YOUR_ACCESS_TOKEN

# SMS Configuration
sms.enabled=false
sms.provider=twilio

# Twilio SMS Configuration
sms.twilio.account.sid=${TWILIO_ACCOUNT_SID:}
sms.twilio.auth.token=${TWILIO_AUTH_TOKEN:}
sms.twilio.from.number=${TWILIO_PHONE_NUMBER:}
sms.twilio.api.url=https://api.twilio.com/2010-04-01

# AWS SNS SMS Configuration (Alternative)
sms.aws.region=us-east-1
sms.aws.access.key=YOUR_AWS_ACCESS_KEY
sms.aws.secret.key=YOUR_AWS_SECRET_KEY

# Alert Service Settings
alert.service.retry.enabled=true
alert.service.retry.max.attempts=3
alert.service.async.enabled=true

# =======================================
# OTP SERVICE CONFIGURATION
# =======================================

# OTP SMS Configuration
otp.sms.enabled=false
otp.country.code=+91
# =======================================
# API INTERCEPTOR & LOGGING CONFIGURATION
# =======================================

# Logging levels
logging.level.root=INFO
logging.level.com.app.auth=INFO
logging.level.com.app.auth.interceptor.ApiLoggingInterceptor=INFO

# For production, you can set interceptor to DEBUG to reduce log volume
# logging.level.com.app.auth.interceptor.ApiLoggingInterceptor=DEBUG

# Log pattern - includes timestamp, level, thread, logger, and message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Async logging configuration
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
